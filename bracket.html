<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup — Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --turf: #0E2B1F;
    --turf-deep: #091F16;
    --chalk: #F3EFE3;
    --chalk-dim: #C9D6CC;
    --line-white: #9CB8A8;
    --amber: #E8A33D;
    --loss-red: #C2604B;
    --correct: #4CAF7D;
    --card-bg: #14331F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--turf-deep);
    background-image: repeating-linear-gradient(180deg, var(--turf-deep) 0px, var(--turf-deep) 80px, var(--turf) 80px, var(--turf) 160px);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .topnav {
    background: rgba(9,31,22,0.95);
    border-bottom: 1px solid rgba(243,239,227,0.08);
    padding: 14px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .topnav a {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    color: var(--chalk-dim);
    padding: 6px 14px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .topnav a:hover { color: var(--amber); }
  .topnav a.active { color: var(--amber); border-bottom: 2px solid var(--amber); }
  .hero {
    position: relative;
    padding: 60px 24px 50px;
    text-align: center;
    border-bottom: 1px solid rgba(243,239,227,0.08);
  }
  .eyebrow {
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--amber);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(36px, 7vw, 72px);
    line-height: 0.96;
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--amber); }
  .hero p {
    max-width: 480px;
    margin: 0 auto;
    color: var(--chalk-dim);
    font-size: 15px;
    line-height: 1.65;
  }
  .wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 48px 20px 100px;
  }
  .round-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--amber);
    margin-bottom: 24px;
  }
  .bracket-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
</style>
</head>
<body>
  <nav class="topnav">
    <a href="index.html">Group Stage</a>
    <a href="bracket.html" class="active">Bracket</a>
  </nav>
  <header class="hero">
    <div class="eyebrow">Model predictions · Live bracket</div>
    <h1>2026 World Cup<br><span>Bracket</span></h1>
    <p>Real results as they happen, with model predictions for every upcoming match.</p>
  </header>
    <main class="wrap">
    <div class="round-label">Round of 32</div>
    <div class="bracket-grid" id="bracket-grid"></div>
  </main>
  <script>
  const MATCHES = [
    { id: 73, team_a: 'Group A Runner-up', team_b: 'Group B Runner-up' },
    { id: 74, team_a: 'Group E Winner', team_b: 'TBD (3rd place)' },
    { id: 75, team_a: 'Group F Winner', team_b: 'Group C Runner-up' },
    { id: 76, team_a: 'Group C Winner', team_b: 'Group F Runner-up' },
    { id: 77, team_a: 'Group I Winner', team_b: 'TBD (3rd place)' },
    { id: 78, team_a: 'Group E Runner-up', team_b: 'Group I Runner-up' },
    { id: 79, team_a: 'Group A Winner', team_b: 'TBD (3rd place)' },
    { id: 80, team_a: 'Group L Winner', team_b: 'TBD (3rd place)' },
    { id: 81, team_a: 'Group D Winner', team_b: 'TBD (3rd place)' },
    { id: 82, team_a: 'Group G Winner', team_b: 'TBD (3rd place)' },
    { id: 83, team_a: 'Group H Winner', team_b: 'Group J Runner-up' },
    { id: 84, team_a: 'Group B Winner', team_b: 'TBD (3rd place)' },
    { id: 85, team_a: 'Group J Winner', team_b: 'Group H Runner-up' },
    { id: 86, team_a: 'Group K Winner', team_b: 'TBD (3rd place)' },
    { id: 87, team_a: 'Group D Runner-up', team_b: 'Group G Runner-up' },
    { id: 88, team_a: 'Group K Runner-up', team_b: 'Group L Runner-up' },
  ];
    function buildMatchCard(match) {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.id = `match-${match.id}`;
  
    card.innerHTML = `
      <div class="match-number">Match ${match.id}</div>
      <div class="match-teams">
        <div class="match-team">${match.team_a}</div>
        <div class="match-vs">vs</div>
        <div class="match-team">${match.team_b}</div>
      </div>
    `;
  
    return card;
  }
  
  const grid = document.getElementById('bracket-grid');
  MATCHES.forEach(m => grid.appendChild(buildMatchCard(m)));
  </script>
</body>
</html>
