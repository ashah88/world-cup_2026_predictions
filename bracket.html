<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup — Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --turf: #0E2B1F;
    --turf-deep: #091F16;
    --chalk: #F3EFE3;
    --chalk-dim: #C9D6CC;
    --line-white: #9CB8A8;
    --amber: #E8A33D;
    --loss-red: #C2604B;
    --correct: #4CAF7D;
    --card-bg: #14331F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--turf-deep);
    background-image: repeating-linear-gradient(180deg, var(--turf-deep) 0px, var(--turf-deep) 80px, var(--turf) 80px, var(--turf) 160px);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .topnav {
    background: rgba(9,31,22,0.95);
    border-bottom: 1px solid rgba(243,239,227,0.08);
    padding: 14px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .topnav a {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    color: var(--chalk-dim);
    padding: 6px 14px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .topnav a:hover { color: var(--amber); }
  .topnav a.active { color: var(--amber); border-bottom: 2px solid var(--amber); }
  .hero {
    position: relative;
    padding: 60px 24px 50px;
    text-align: center;
    border-bottom: 1px solid rgba(243,239,227,0.08);
  }
  .eyebrow {
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--amber);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(36px, 7vw, 72px);
    line-height: 0.96;
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--amber); }
  .hero p {
    max-width: 480px;
    margin: 0 auto;
    color: var(--chalk-dim);
    font-size: 15px;
    line-height: 1.65;
  }
  .round-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--amber);
    margin-bottom: 24px;
  }
  .bracket-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .match-card {
    background: var(--card-bg);
    border: 1px solid rgba(243,239,227,0.09);
    border-radius: 6px;
    padding: 18px 20px;
  }
  .match-number {
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--line-white);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .match-teams {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .match-team {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .match-vs {
    font-size: 11px;
    color: var(--line-white);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 48px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }
  .bracket-half {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .half-label {
    font-family: 'Oswald', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--amber);
  }
  .bracket-rounds {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    overflow-x: auto;
    gap: 0px;
  }
  .match-card {
    background: var(--card-bg);
    border: 1px solid rgba(243,239,227,0.09);
    border-radius: 6px;
    padding: 12px 14px;
    width: 180px;
    flex-shrink: 0;
  }
  .match-number {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--line-white);
    font-weight: 600;
    margin-bottom: 10px;
  }
  .match-team {
    font-family: 'Oswald', sans-serif;
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    padding: 6px 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .match-team.tbd {
    color: var(--line-white);
    font-style: italic;
  }
  .match-divider {
    height: 1px;
    background: rgba(243,239,227,0.09);
    margin: 2px 0;
  }
  .round-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-width: 200px;
    flex: 1;
  }
  .round-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--amber);
    margin-bottom: 4px;
    padding-left: 4px;
  }
  .round-cards {
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: space-around;
    flex: 1;
    height: 100%;
  }
  .match-pair {
    display: flex;
    flex-direction: column;
    gap: 8px;
    position: relative;
    flex: 1;
    justify-content: space-around;
  }
  .match-pair::after {
    content: '';
    position: absolute;
    right: -20px;
    top: 50%;
    width: 20px;
    height: 1px;
    background: rgba(243,239,227,0.2);
  }
  .match-pair::before {
    content: '';
    position: absolute;
    right: -20px;
    top: 25%;
    bottom: 25%;
    width: 1px;
    background: rgba(243,239,227,0.2);
  }
</style>
</head>
<body>
  <nav class="topnav">
    <a href="index.html">Group Stage</a>
    <a href="bracket.html" class="active">Bracket</a>
  </nav>
  <header class="hero">
    <div class="eyebrow">Model predictions · Live bracket</div>
    <h1>2026 World Cup<br><span>Bracket</span></h1>
    <p>Real results as they happen, with model predictions for every upcoming match.</p>
  </header>
  
  <main class="wrap">
    <div class="bracket-half" id="top-half">
      <div class="half-label">Top Half</div>
      <div class="bracket-rounds" id="top-rounds"></div>
    </div>
    <div class="bracket-half" id="bottom-half">
      <div class="half-label">Bottom Half</div>
      <div class="bracket-rounds" id="bottom-rounds"></div>
    </div>
</main>
  <script>
  const BRACKET = {
    top: {
      r32: [
        { id: 73, team_a: 'TBD', team_b: 'TBD' },
        { id: 76, team_a: 'TBD', team_b: 'TBD' },
        { id: 75, team_a: 'TBD', team_b: 'TBD' },
        { id: 74, team_a: 'TBD', team_b: 'TBD' },
        { id: 77, team_a: 'TBD', team_b: 'TBD' },
        { id: 78, team_a: 'TBD', team_b: 'TBD' },
        { id: 79, team_a: 'TBD', team_b: 'TBD' },
        { id: 80, team_a: 'TBD', team_b: 'TBD' },
      ],
      r16: [
        { id: 89, team_a: 'TBD', team_b: 'TBD' },
        { id: 90, team_a: 'TBD', team_b: 'TBD' },
        { id: 91, team_a: 'TBD', team_b: 'TBD' },
        { id: 92, team_a: 'TBD', team_b: 'TBD' },
      ],
      qf: [
        { id: 97, team_a: 'TBD', team_b: 'TBD' },
        { id: 98, team_a: 'TBD', team_b: 'TBD' },
      ],
      sf: [
        { id: 101, team_a: 'TBD', team_b: 'TBD' },
      ],
    },
    bottom: {
      r32: [
        { id: 81, team_a: 'TBD', team_b: 'TBD' },
        { id: 82, team_a: 'TBD', team_b: 'TBD' },
        { id: 83, team_a: 'TBD', team_b: 'TBD' },
        { id: 84, team_a: 'TBD', team_b: 'TBD' },
        { id: 85, team_a: 'TBD', team_b: 'TBD' },
        { id: 86, team_a: 'TBD', team_b: 'TBD' },
        { id: 87, team_a: 'TBD', team_b: 'TBD' },
        { id: 88, team_a: 'TBD', team_b: 'TBD' },
      ],
      r16: [
        { id: 93, team_a: 'TBD', team_b: 'TBD' },
        { id: 94, team_a: 'TBD', team_b: 'TBD' },
        { id: 95, team_a: 'TBD', team_b: 'TBD' },
        { id: 96, team_a: 'TBD', team_b: 'TBD' },
      ],
      qf: [
        { id: 99, team_a: 'TBD', team_b: 'TBD' },
        { id: 100, team_a: 'TBD', team_b: 'TBD' },
      ],
      sf: [
        { id: 102, team_a: 'TBD', team_b: 'TBD' },
      ],
    },
    final: { id: 103, team_a: 'TBD', team_b: 'TBD' }
  };
  function buildMatchCard(match, roundName) {
    const card = document.createElement('div');
    card.className = 'match-card';
    card.id = `match-${match.id}`;
  
    card.innerHTML = `
      <div class="match-number">${roundName} · M${match.id}</div>
      <div class="match-team ${match.team_a === 'TBD' ? 'tbd' : ''}">${match.team_a}</div>
      <div class="match-divider"></div>
      <div class="match-team ${match.team_b === 'TBD' ? 'tbd' : ''}">${match.team_b}</div>
    `;
  
    return card;
  }
  function buildRoundColumn(matches, roundName) {
    const column = document.createElement('div');
    column.className = 'round-column';
  
    const label = document.createElement('div');
    label.className = 'round-label';
    label.textContent = roundName;
    column.appendChild(label);
  
    const cards = document.createElement('div');
    cards.className = 'round-cards';
  
    for (let i = 0; i < matches.length; i += 2) {
      const pair = document.createElement('div');
      pair.className = 'match-pair';
  
      pair.appendChild(buildMatchCard(matches[i], roundName));
  
      if (matches[i + 1]) {
        pair.appendChild(buildMatchCard(matches[i + 1], roundName));
      }
  
      cards.appendChild(pair);
    }
  
    column.appendChild(cards);
    return column;
  }
  function renderBracket() {
    const topRounds = document.getElementById('top-rounds');
    const bottomRounds = document.getElementById('bottom-rounds');
  
    // Top half
    topRounds.appendChild(buildRoundColumn(BRACKET.top.r32, 'Round of 32'));
    topRounds.appendChild(buildRoundColumn(BRACKET.top.r16, 'Round of 16'));
    topRounds.appendChild(buildRoundColumn(BRACKET.top.qf, 'Quarter Finals'));
    topRounds.appendChild(buildRoundColumn(BRACKET.top.sf, 'Semi Finals'));
  
    // Bottom half
    bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.r32, 'Round of 32'));
    bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.r16, 'Round of 16'));
    bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.qf, 'Quarter Finals'));
    bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.sf, 'Semi Finals'));
  
    // Final
    const finalColumn = buildRoundColumn([BRACKET.final], 'Final');
    finalColumn.id = 'final-column';
    document.querySelector('.wrap').appendChild(finalColumn);
  }
  
  renderBracket();
  </script>
</body>
</html>
