<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup — Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --turf: #0E2B1F;
      --turf-deep: #091F16;
      --chalk: #F3EFE3;
      --chalk-dim: #C9D6CC;
      --line-white: #9CB8A8;
      --amber: #E8A33D;
      --loss-red: #C2604B;
      --correct: #4CAF7D;
      --card-bg: #14331F;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--turf-deep);
      background-image: repeating-linear-gradient(180deg, var(--turf-deep) 0px, var(--turf-deep) 80px, var(--turf) 80px, var(--turf) 160px);
      color: var(--chalk);
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    ::selection { background: var(--amber); color: var(--turf-deep); }

    /* NAV */
    .topnav {
      background: rgba(9,31,22,0.95);
      border-bottom: 1px solid rgba(243,239,227,0.08);
      padding: 14px 24px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .topnav a {
      font-family: 'Oswald', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-decoration: none;
      color: var(--chalk-dim);
      padding: 6px 14px;
      border-radius: 4px;
      transition: all 0.15s;
    }
    .topnav a:hover { color: var(--amber); }
    .topnav a.active { color: var(--amber); border-bottom: 2px solid var(--amber); }

    /* HERO */
    .hero {
      position: relative;
      padding: 60px 24px 50px;
      text-align: center;
      border-bottom: 1px solid rgba(243,239,227,0.08);
    }
    .eyebrow {
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--amber);
      margin-bottom: 16px;
    }
    .hero h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: clamp(36px, 7vw, 72px);
      line-height: 0.96;
      margin-bottom: 16px;
    }
    .hero h1 span { color: var(--amber); }
    .hero p {
      max-width: 480px;
      margin: 0 auto;
      color: var(--chalk-dim);
      font-size: 15px;
      line-height: 1.65;
    }

    /* LAYOUT */
    .wrap {
      max-width: 1600px;
      margin: 0 auto;
      padding: 48px 20px 100px;
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    /* BRACKET HALF */
    .bracket-half {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .half-label {
      font-family: 'Oswald', sans-serif;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--line-white);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(243,239,227,0.08);
    }
    .bracket-rounds {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      gap: 12px;
      overflow-x: auto;
      padding: 16px 0;
    }

    /* ROUND COLUMN */
    .round-column {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 190px;
      flex: 1;
    }
    .round-label {
      font-family: 'Oswald', sans-serif;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--amber);
      margin-bottom: 6px;
      padding-left: 2px;
    }
    .round-cards {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      gap: 8px;
    }

    /* MATCH PAIR */
    .match-pair {
      display: flex;
      flex-direction: column;
      flex: 1;
      justify-content: space-around;
      gap: 8px;
    }

    /* MATCH CARD */
    .match-card {
      background: var(--card-bg);
      border: 1px solid rgba(243,239,227,0.09);
      border-radius: 6px;
      padding: 10px 12px;
      width: 190px;
      flex-shrink: 0;
      transition: border-color 0.15s;
    }
    .match-card:hover {
      border-color: rgba(232,163,61,0.3);
    }
    .match-number {
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--line-white);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .match-team {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      padding: 5px 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match-team.tbd {
      color: var(--line-white);
      font-style: italic;
      font-weight: 400;
    }
    .match-divider {
      height: 1px;
      background: rgba(243,239,227,0.09);
      margin: 1px 0;
    }

    /* FINAL */
    .final-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 0 0;
      border-top: 1px solid rgba(243,239,227,0.08);
    }
    .final-label {
      font-family: 'Oswald', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--amber);
    }
    .final-card {
      background: var(--card-bg);
      border: 1px solid rgba(232,163,61,0.25);
      border-radius: 6px;
      padding: 14px 20px;
      width: 240px;
    }
    .champion-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .champion-label {
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--amber);
      font-weight: 600;
    }
    .champion-team {
      font-family: 'Oswald', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--amber);
    }
    .champion-team.tbd {
      color: var(--line-white);
      font-style: italic;
      font-weight: 400;
      font-size: 16px;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 40px 20px 60px;
      color: var(--line-white);
      font-size: 12px;
      line-height: 1.8;
      border-top: 1px solid rgba(243,239,227,0.08);
    }
    footer .sig { font-style: italic; color: var(--chalk-dim); }

    @media (max-width: 480px) {
      .hero { padding: 48px 16px 36px; }
      .wrap { padding: 28px 12px 60px; }
    }
  </style>
</head>
<body>

<nav class="topnav">
  <a href="index.html">Group Stage</a>
  <a href="bracket.html" class="active">Bracket</a>
</nav>

<header class="hero">
  <div class="eyebrow">Live bracket · Model predictions</div>
  <h1>2026 World Cup<br><span>Bracket</span></h1>
  <p>Real results as they happen. Fill in teams as they advance through each round.</p>
</header>

<main class="wrap" id="main-wrap"></main>

<footer>
  <p class="sig">Built pitchside, from the data up.</p>
</footer>

<script>
const BRACKET = {
  top: {
    r32: [
      { id: 73, team_a: 'Germany', team_b: 'Paraguay' },
      { id: 76, team_a: 'France', team_b: 'Sweden' },
      { id: 75, team_a: 'South Korea', team_b: 'Switzerland' },
      { id: 74, team_a: 'Netherlands', team_b: 'Morocco' },
      { id: 77, team_a: 'Portugal', team_b: 'Ghana' },
      { id: 78, team_a: 'Spain', team_b: 'Austria' },
      { id: 79, team_a: 'United States', team_b: 'Algeria' },
      { id: 80, team_a: 'Egypt', team_b: 'Czech Republic' },
    ],
    r16: [
      { id: 89, team_a: 'Germany', team_b: 'France' },
      { id: 90, team_a: 'South Korea', team_b: 'Netherlands' },
      { id: 91, team_a: 'Portugal', team_b: 'Spain' },
      { id: 92, team_a: 'United States', team_b: 'Egypt' },
    ],
    qf: [
      { id: 97, team_a: 'Germany', team_b: 'Netherlands' },
      { id: 98, team_a: 'Spain', team_b: 'United States' },
    ],
    sf: [
      { id: 101, team_a: 'Germany', team_b: 'Spain' },
    ],
  },
  bottom: {
    r32: [
      { id: 81, team_a: 'Brazil', team_b: 'Japan' },
      { id: 82, team_a: 'Ivory Coast', team_b: 'Norway' },
      { id: 83, team_a: 'Mexico', team_b: 'Scotland' },
      { id: 84, team_a: 'England', team_b: 'Cape Verde' },
      { id: 85, team_a: 'Argentina', team_b: 'Uruguay' },
      { id: 86, team_a: 'Australia', team_b: 'Iran' },
      { id: 87, team_a: 'Canada', team_b: 'Belgium' },
      { id: 88, team_a: 'Colombia', team_b: 'Croatia' },
    ],
    r16: [
      { id: 93, team_a: 'Brazil', team_b: 'Norway' },
      { id: 94, team_a: 'Mexico', team_b: 'England' },
      { id: 95, team_a: 'Argentina', team_b: 'Australia' },
      { id: 96, team_a: 'Belgium', team_b: 'Colombia' },
    ],
    qf: [
      { id: 99, team_a: 'Brazil', team_b: 'Mexico' },
      { id: 100, team_a: 'Argentina', team_b: 'Colombia' },
    ],
    sf: [
      { id: 102, team_a: 'Mexico', team_b: 'Argentina' },
    ],
  },
  final: { id: 103, team_a: 'Germany', team_b: 'Argentina' },
  champion: 'Argentina'
};

function buildMatchCard(match, roundName) {
  const card = document.createElement('div');
  card.className = 'match-card';
  card.id = `match-${match.id}`;
  card.innerHTML = `
    <div class="match-number">${roundName} · M${match.id}</div>
    <div class="match-team ${match.team_a === 'TBD' ? 'tbd' : ''}">${match.team_a}</div>
    <div class="match-divider"></div>
    <div class="match-team ${match.team_b === 'TBD' ? 'tbd' : ''}">${match.team_b}</div>
  `;
  return card;
}

function buildRoundColumn(matches, roundName) {
  const column = document.createElement('div');
  column.className = 'round-column';

  const label = document.createElement('div');
  label.className = 'round-label';
  label.textContent = roundName;
  column.appendChild(label);

  const cards = document.createElement('div');
  cards.className = 'round-cards';

  for (let i = 0; i < matches.length; i += 2) {
    const pair = document.createElement('div');
    pair.className = 'match-pair';
    pair.appendChild(buildMatchCard(matches[i], roundName));
    if (matches[i + 1]) {
      pair.appendChild(buildMatchCard(matches[i + 1], roundName));
    }
    cards.appendChild(pair);
  }

  column.appendChild(cards);
  return column;
}

function renderBracket() {
  const wrap = document.getElementById('main-wrap');

  // TOP HALF
  const topHalf = document.createElement('div');
  topHalf.className = 'bracket-half';
  topHalf.innerHTML = '<div class="half-label">Top Half</div>';
  const topRounds = document.createElement('div');
  topRounds.className = 'bracket-rounds';
  topRounds.appendChild(buildRoundColumn(BRACKET.top.r32, 'Round of 32'));
  topRounds.appendChild(buildRoundColumn(BRACKET.top.r16, 'Round of 16'));
  topRounds.appendChild(buildRoundColumn(BRACKET.top.qf, 'Quarter Finals'));
  topRounds.appendChild(buildRoundColumn(BRACKET.top.sf, 'Semi Finals'));
  topHalf.appendChild(topRounds);
  wrap.appendChild(topHalf);

  // FINAL
  const finalWrap = document.createElement('div');
  finalWrap.className = 'final-wrap';
  finalWrap.innerHTML = `<div class="final-label">Final</div>`;
  const finalCard = document.createElement('div');
  finalCard.className = 'final-card match-card';
  finalCard.id = 'match-103';
  finalCard.innerHTML = `
    <div class="match-number">Final · M103</div>
    <div class="match-team ${BRACKET.final.team_a === 'TBD' ? 'tbd' : ''}">${BRACKET.final.team_a}</div>
    <div class="match-divider"></div>
    <div class="match-team ${BRACKET.final.team_b === 'TBD' ? 'tbd' : ''}">${BRACKET.final.team_b}</div>
  `;
  finalWrap.appendChild(finalCard);

  const champWrap = document.createElement('div');
  champWrap.className = 'champion-wrap';
  champWrap.innerHTML = `
    <div class="champion-label">🏆 Champion</div>
    <div class="champion-team ${BRACKET.champion === 'TBD' ? 'tbd' : ''}">${BRACKET.champion}</div>
  `;
  finalWrap.appendChild(champWrap);
  wrap.appendChild(finalWrap);

  // BOTTOM HALF
  const bottomHalf = document.createElement('div');
  bottomHalf.className = 'bracket-half';
  bottomHalf.innerHTML = '<div class="half-label">Bottom Half</div>';
  const bottomRounds = document.createElement('div');
  bottomRounds.className = 'bracket-rounds';
  bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.r32, 'Round of 32'));
  bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.r16, 'Round of 16'));
  bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.qf, 'Quarter Finals'));
  bottomRounds.appendChild(buildRoundColumn(BRACKET.bottom.sf, 'Semi Finals'));
  bottomHalf.appendChild(bottomRounds);
  wrap.appendChild(bottomHalf);
}

renderBracket();
</script>

</body>
</html>
