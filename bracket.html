<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 World Cup — Bracket</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --turf: #0E2B1F;
    --turf-deep: #091F16;
    --chalk: #F3EFE3;
    --chalk-dim: #C9D6CC;
    --line-white: #9CB8A8;
    --amber: #E8A33D;
    --loss-red: #C2604B;
    --correct: #4CAF7D;
    --card-bg: #14331F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--turf-deep);
    background-image: repeating-linear-gradient(180deg, var(--turf-deep) 0px, var(--turf-deep) 80px, var(--turf) 80px, var(--turf) 160px);
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .topnav {
    background: rgba(9,31,22,0.95);
    border-bottom: 1px solid rgba(243,239,227,0.08);
    padding: 14px 24px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .topnav a {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    text-decoration: none;
    color: var(--chalk-dim);
    padding: 6px 14px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .topnav a:hover { color: var(--amber); }
  .topnav a.active { color: var(--amber); border-bottom: 2px solid var(--amber); }
  .hero {
    position: relative;
    padding: 60px 24px 50px;
    text-align: center;
    border-bottom: 1px solid rgba(243,239,227,0.08);
  }
  .eyebrow {
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--amber);
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(36px, 7vw, 72px);
    line-height: 0.96;
    margin-bottom: 16px;
  }
  .hero h1 span { color: var(--amber); }
  .hero p {
    max-width: 480px;
    margin: 0 auto;
    color: var(--chalk-dim);
    font-size: 15px;
    line-height: 1.65;
  }
</style>
</head>
<body>
  <nav class="topnav">
    <a href="index.html">Group Stage</a>
    <a href="bracket.html" class="active">Bracket</a>
  </nav>
  <header class="hero">
    <div class="eyebrow">Model predictions · Live bracket</div>
    <h1>2026 World Cup<br><span>Bracket</span></h1>
    <p>Real results as they happen, with model predictions for every upcoming match.</p>
  </header>
</body>
</html>
